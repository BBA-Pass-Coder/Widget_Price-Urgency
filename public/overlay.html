<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Root Labs - Price Urgency</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;overflow:hidden;font-family:'Libre Franklin',sans-serif}

.card{
  position:fixed;top:20px;right:20px;
  width:300px;
  background:rgba(15,31,26,0.92);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(74,124,89,0.25);
  border-radius:18px;
  padding:18px 20px;
  color:#F5F0E8;
  transition:border-color 0.6s, box-shadow 0.6s;
}
.card.amber{border-color:rgba(201,168,76,0.45);box-shadow:0 0 24px rgba(201,168,76,0.12)}
.card.red{border-color:rgba(220,80,80,0.6);box-shadow:0 0 28px rgba(220,80,80,0.18);animation:redPulse 2s ease-in-out infinite}
.card.ended{border-color:rgba(100,100,100,0.4)}

@keyframes redPulse{0%,100%{box-shadow:0 0 28px rgba(220,80,80,0.15)}50%{box-shadow:0 0 36px rgba(220,80,80,0.3)}}

.gold-line{position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,#C9A84C,transparent);opacity:0.4}

.head{display:flex;align-items:center;gap:6px;font-size:9px;font-weight:800;letter-spacing:2.5px;
  color:#C9A84C;margin-bottom:12px;text-transform:uppercase}
.head .ic{font-size:12px}

.timer{font-family:'Playfair Display',serif;font-size:44px;font-weight:800;
  line-height:1;letter-spacing:-1px;text-align:center;margin:6px 0 14px;
  transition:color 0.6s}
.card.amber .timer{color:#E8C165}
.card.red .timer{color:#F08080}

.stock-wrap{margin-top:10px}
.stock-label{display:flex;justify-content:space-between;align-items:center;
  font-size:11px;font-weight:700;margin-bottom:5px}
.stock-count{font-family:'Playfair Display',serif;font-size:15px}
.stock-bar{width:100%;height:6px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
.stock-fill{height:100%;background:linear-gradient(90deg,#2A7A52,#5BC88A);
  border-radius:4px;transition:width 0.5s, background 0.5s}
.card.amber .stock-fill{background:linear-gradient(90deg,#8C6A1E,#C9A84C)}
.card.red .stock-fill{background:linear-gradient(90deg,#8C2A2A,#DC5050)}

.footer{margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);
  display:flex;justify-content:space-between;font-size:10px;color:rgba(168,213,186,0.6);font-weight:600}
.footer .was{text-decoration:line-through;opacity:0.5}
.footer .now{color:#C9A84C}

/* ENDED STATE */
.ended-card{display:none}
.card.ended .live-card{display:none}
.card.ended .ended-card{display:block}

.ended-label{font-size:10px;font-weight:800;letter-spacing:2px;color:#C9A84C;
  text-align:center;margin-bottom:10px;text-transform:uppercase}
.ended-price{font-family:'Playfair Display',serif;font-size:52px;font-weight:800;
  text-align:center;color:#C9A84C;line-height:1;margin-bottom:8px}
.ended-msg{font-size:11px;text-align:center;color:rgba(245,240,232,0.7);line-height:1.5}
.ended-was{text-align:center;margin-top:10px;font-size:10px;color:rgba(168,213,186,0.5)}
.ended-was .strike{text-decoration:line-through}

</style>
</head>
<body>
<div class="card" id="card">
  <div class="gold-line"></div>

  <!-- LIVE / ACTIVE STATE -->
  <div class="live-card">
    <div class="head">
      <span class="ic">⚡</span>
      <span id="head-label">LIVE PRICE ENDS IN</span>
    </div>
    <div class="timer" id="timer">--:--</div>

    <div class="stock-wrap">
      <div class="stock-label">
        <span id="stock-text">-- bags left at <span id="live-price-in-stock">$20</span></span>
        <span class="stock-count"><span id="stock-remaining">0</span>/<span id="stock-initial">0</span></span>
      </div>
      <div class="stock-bar"><div class="stock-fill" id="stock-fill" style="width:0%"></div></div>
    </div>

    <div class="footer">
      <span>Regular <span class="was" id="f-reg">$27</span></span>
      <span>Flash <span id="f-flash">$24</span></span>
      <span>Live <span class="now" id="f-live">$20</span></span>
    </div>
  </div>

  <!-- ENDED STATE -->
  <div class="ended-card">
    <div class="ended-label" id="ended-reason">$20 LIVE PRICE ENDED</div>
    <div class="ended-price" id="ended-now-price">$24</div>
    <div class="ended-msg" id="ended-msg">Back to flash sale price. Still below regular.</div>
    <div class="ended-was">
      <span class="strike" id="ended-was-live">$20</span> · Regular <span class="strike" id="ended-was-reg">$27</span>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io();
var state = null;

function fmtTime(sec) {
  sec = Math.max(0, Math.floor(sec));
  var h = Math.floor(sec / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = sec % 60;
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  if (h > 0) return h + ":" + pad(m) + ":" + pad(s);
  return pad(m) + ":" + pad(s);
}

function getRemainingSec() {
  if (!state) return 0;
  if (state.timerRunning && state.timerEndsAt) {
    return Math.max(0, Math.floor((state.timerEndsAt - Date.now()) / 1000));
  }
  return state.timerPausedRemainingSec || 0;
}

function render() {
  if (!state) return;
  var card = document.getElementById("card");

  if (!state.priceActive) {
    card.className = "card ended";
    var reasonEl = document.getElementById("ended-reason");
    if (state.endReason === "stock") reasonEl.textContent = state.priceLive + " SOLD OUT";
    else if (state.endReason === "timer") reasonEl.textContent = state.priceLive + " WINDOW CLOSED";
    else reasonEl.textContent = state.priceLive + " LIVE PRICE ENDED";
    document.getElementById("ended-now-price").textContent = state.priceFlash;
    document.getElementById("ended-was-live").textContent = state.priceLive;
    document.getElementById("ended-was-reg").textContent = state.priceRegular;
    document.getElementById("ended-msg").textContent =
      "Back to flash sale price. Still below regular.";
    return;
  }

  var remainingSec = getRemainingSec();
  var stockRemaining = Math.max(0, state.stockInitial - state.stockSold);
  var stockPct = state.stockInitial > 0
    ? Math.round((stockRemaining / state.stockInitial) * 100)
    : 0;

  // URGENCY STATE — red if <5min OR <20% stock; amber if <20min OR <50% stock
  var urgency = "";
  var timeUrg = state.timerRunning && remainingSec > 0
    ? (remainingSec < 300 ? "red" : (remainingSec < 1200 ? "amber" : ""))
    : "";
  var stockUrg = stockPct < 20 ? "red" : (stockPct < 50 ? "amber" : "");
  // take the more urgent of the two
  if (timeUrg === "red" || stockUrg === "red") urgency = "red";
  else if (timeUrg === "amber" || stockUrg === "amber") urgency = "amber";
  card.className = "card" + (urgency ? " " + urgency : "");

  // TIMER
  if (state.timerRunning) {
    document.getElementById("head-label").textContent = state.priceLive + " LIVE PRICE ENDS IN";
    document.getElementById("timer").textContent = fmtTime(remainingSec);
  } else {
    document.getElementById("head-label").textContent = state.priceLive + " LIVE PRICE — TIMER PAUSED";
    document.getElementById("timer").textContent = fmtTime(state.timerPausedRemainingSec);
  }

  // STOCK
  document.getElementById("stock-text").innerHTML =
    stockRemaining + " bags left at <span>" + state.priceLive + "</span>";
  document.getElementById("stock-remaining").textContent = stockRemaining;
  document.getElementById("stock-initial").textContent = state.stockInitial;
  document.getElementById("stock-fill").style.width = stockPct + "%";

  // FOOTER PRICES
  document.getElementById("f-reg").textContent = state.priceRegular;
  document.getElementById("f-flash").textContent = state.priceFlash;
  document.getElementById("f-live").textContent = state.priceLive;
  document.getElementById("live-price-in-stock").textContent = state.priceLive;
}

socket.on("state", function(s) {
  state = s;
  render();
});

// Local tick every 100ms so the timer updates smoothly even between server broadcasts
setInterval(render, 200);
</script>
</body>
</html>
